<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#25003e"/>
      <stop offset="100%" stop-color="#140021"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#ff7b02"/>
      <stop offset="100%" stop-color="#e5a55d"/>
    </linearGradient>
  </defs>
  
  <!-- Stylized "PT" monogram -->
  <g transform="translate(256, 256)">
    <!-- P -->
    <path d="M -120 -140 L -120 140 L -80 140 L -80 20 L -20 20 C 20 20 60 20 60 -60 C 60 -140 20 -140 -20 -140 Z M -80 -100 L -20 -100 C 0 -100 20 -100 20 -60 C 20 -20 0 -20 -20 -20 L -80 -20 Z" 
          fill="url(#textGradient)" 
          stroke="#ff7b02" 
          stroke-width="4"/>
    
    <!-- T -->
    <path d="M 40 -140 L 40 -100 L 80 -100 L 80 140 L 120 140 L 120 -100 L 160 -100 L 160 -140 Z" 
          fill="url(#textGradient)" 
          stroke="#e5a55d" 
          stroke-width="4"/>
    
    <!-- Accent line (trading chart metaphor) -->
    <path d="M -140 180 Q -60 160 0 180 T 140 180" 
          stroke="#ff7b02" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.6"/>
  </g>
</svg>
